name: release

# Builds Snarbols desktop installers for macOS, Windows, and Linux and
# publishes them to a GitHub Release. Trigger by pushing a v* tag, or
# manually via the Actions tab / `gh workflow run`.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.1.9-snarbols)"
        required: true
        default: "v0.1.9-snarbols"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: ""
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Snarbols ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: |
            Snarbols desktop builds. Download the installer for your platform below.

            ⚠️ These are **unsigned** builds. On first launch:
            - **Windows**: SmartScreen → "More info" → "Run anyway".
            - **macOS**: right-click the app → "Open" (Gatekeeper).

            Snarbols is GPL-3.0 free software, a fork of Pluely by Srikanth Nani.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
